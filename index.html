<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Voz → Libras</title>

<style>
body{
    margin:0;
    height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #0b1220, #1b2a4a);
}

/* CONTAINER */
.container{
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:18px;
}

/* 🎤 MIC */
.mic{
    width:150px;
    height:150px;
    border-radius:50%;
    cursor:pointer;
    position:relative;

    background: radial-gradient(circle at 35% 30%, #2c2f36, #0e1117 70%);

    box-shadow:
        0 12px 28px rgba(0,0,0,0.65),
        inset 0 2px 10px rgba(255,255,255,0.05),
        inset 0 -6px 12px rgba(0,0,0,0.6);

    transition:0.25s ease;
}

/* grelha do mic */
.mic::before{
    content:"";
    position:absolute;
    top:28px;
    left:50%;
    transform:translateX(-50%);
    width:58px;
    height:70px;
    border-radius:18px;

    background:
        repeating-linear-gradient(
            90deg,
            #cfd3d8 0px,
            #cfd3d8 2px,
            #8b9096 2px,
            #8b9096 4px
        );

    box-shadow:
        inset 0 2px 6px rgba(0,0,0,0.5),
        inset 0 -2px 6px rgba(255,255,255,0.1);
}

/* base */
.mic::after{
    content:"";
    position:absolute;
    bottom:-35px;
    left:50%;
    transform:translateX(-50%);
    width:10px;
    height:45px;
    border-radius:6px;

    background: linear-gradient(180deg, #8c8f96, #3f434a);

    box-shadow: 0 5px 10px rgba(0,0,0,0.5);
}

/* ativo */
.mic.ativo{
    box-shadow:
        0 0 25px rgba(80,160,255,0.35),
        0 12px 28px rgba(0,0,0,0.65),
        inset 0 2px 10px rgba(255,255,255,0.05);
}

/* STATUS */
#status{
    font-size:1.15rem;
    font-weight:500;
    color:#d6d6d6;

    padding:6px 14px;
    border-radius:999px;

    background: rgba(255,255,255,0.04);
    backdrop-filter: blur(6px);
}

/* LEGENDA */
#legenda{
    position:fixed;
    bottom:40px;
    left:50%;
    transform:translateX(-50%);
    background: rgba(0,0,0,0.65);
    padding:14px 22px;
    border-radius:14px;
    color:#fff;
    font-size:1.1rem;
    max-width:80%;
    text-align:center;
    opacity:0;
    transition:0.3s;
    white-space: pre-line;
    backdrop-filter: blur(6px);
}

#legenda.show{
    opacity:1;
}

/* VLibras NÃO bloquear clique */
[vw],
[vw-access-button],
.vw-plugin-wrapper {
    pointer-events: auto !important;
}
</style>
</head>

<body>

<div class="container">

    <div id="mic" class="mic"></div>

    <div id="status">Ativar microfone</div>

</div>

<div id="legenda"></div>

<!-- VLibras (VERSÃO ESTÁVEL) -->
<div vw class="enabled">
  <div vw-access-button class="active"></div>
  <div vw-plugin-wrapper>
    <div class="vw-plugin-top-wrapper"></div>
  </div>
</div>

<script src="https://vlibras.gov.br/app/vlibras-plugin.js"></script>

<script>
/* VLibras inicialização correta */
window.addEventListener("load", () => {
    new window.VLibras.Widget('https://vlibras.gov.br/app');
});

/* MICROFONE */
const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
const recognition = new SpeechRecognition();

recognition.lang = "pt-BR";
recognition.continuous = true;
recognition.interimResults = true;

let ativo = false;
let timeoutLegenda;

const mic = document.getElementById("mic");
const status = document.getElementById("status");

/* LIGA / DESLIGA */
mic.onclick = () => {
    if(!ativo){
        recognition.start();
        ativo = true;
        mic.classList.add("ativo");
        status.innerText = "Desativar microfone";
    } else {
        recognition.stop();
        ativo = false;
        mic.classList.remove("ativo");
        status.innerText = "Ativar microfone";
    }
};

/* VOZ → TEXTO */
recognition.onresult = (event) => {
    let textoFinal = "";
    let textoParcial = "";

    for(let i = event.resultIndex; i < event.results.length; i++){
        let transcript = event.results[i][0].transcript;

        if(event.results[i].isFinal){
            textoFinal += transcript + " ";
        } else {
            textoParcial += transcript;
        }
    }

    let texto = (textoFinal + textoParcial).trim();

    if(texto.length > 0){
        mostrarLegenda(texto);
    }
};

/* LEGENDA */
function mostrarLegenda(texto){
    const legenda = document.getElementById("legenda");

    if(texto.length > 60){
        let meio = Math.floor(texto.length / 2);
        let quebra = texto.lastIndexOf(" ", meio);
        if(quebra !== -1){
            texto = texto.slice(0, quebra) + "\n" + texto.slice(quebra + 1);
        }
    }

    legenda.innerText = texto;
    legenda.classList.add("show");

    clearTimeout(timeoutLegenda);
    timeoutLegenda = setTimeout(()=>{
        legenda.classList.remove("show");
    },3500);
};

recognition.onend = () => {
    if(ativo){
        setTimeout(()=> recognition.start(),200);
    }
};
</script>

</body>
</html>
