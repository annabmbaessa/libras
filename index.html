<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Voz → Libras</title>

<style>
body{
    margin:0;
    height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #0f172a, #1e3a8a);
}

/* 🎤 BOTÃO MICROFONE */
.mic{
    width:140px;
    height:140px;
    border-radius:50%;
    display:flex;
    align-items:center;
    justify-content:center;
    background:#111;
    cursor:pointer;
    transition:0.3s;
    box-shadow: 0 0 20px rgba(255,255,255,0.1);
}

/* ESTADO ATIVO */
.mic.ativo{
    box-shadow: 0 0 40px #22c55e;
    transform: scale(1.08);
}

/* IMAGEM */
.mic img{
    width:70px;
    pointer-events:none;
}

/* LEGENDA */
#legenda{
    position:fixed;
    bottom:40px;
    left:50%;
    transform:translateX(-50%);
    background: rgba(0,0,0,0.7);
    padding:15px 25px;
    border-radius:15px;
    color:#fff;
    font-size:1.2rem;
    max-width:80%;
    text-align:center;
    opacity:0;
    transition:0.3s;
    white-space: pre-line;
}

#legenda.show{
    opacity:1;
}


[vw] {
    pointer-events: auto;
}

[vw] > * {
    pointer-events: none;
}

[vw-access-button],
.vw-plugin-wrapper {
    pointer-events: auto;
}
</style>
</head>

<body>


<div id="mic" class="mic">
    <img src="https://e7.pngegg.com/pngimages/149/563/png-clipart-microphone-google-voice-search-google-search-microphone-electronics-microphone.png">
</div>

<div id="legenda"></div>

<!-- VLibras -->
<div vw class="enabled">
  <div vw-access-button class="active"></div>
  <div vw-plugin-wrapper>
    <div class="vw-plugin-top-wrapper"></div>
  </div>
</div>

<script src="https://vlibras.gov.br/app/vlibras-plugin.js"></script>

<script>
new window.VLibras.Widget('https://vlibras.gov.br/app');

const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
const recognition = new SpeechRecognition();

recognition.lang = "pt-BR";
recognition.continuous = true;
recognition.interimResults = true;

let ativo = false;
let timeoutLegenda;

const mic = document.getElementById("mic");

// 🎤 LIGA / DESLIGA (SEM TEXTO → NÃO ATIVA VLIBRAS)
mic.onclick = () => {
    if(!ativo){
        recognition.start();
        ativo = true;
        mic.classList.add("ativo");
    } else {
        recognition.stop();
        ativo = false;
        mic.classList.remove("ativo");
    }
};

// VOZ → TEXTO
recognition.onresult = (event) => {
    let textoFinal = "";
    let textoParcial = "";

    for(let i = event.resultIndex; i < event.results.length; i++){
        let transcript = event.results[i][0].transcript;

        if(event.results[i].isFinal){
            textoFinal += transcript + " ";
        } else {
            textoParcial += transcript;
        }
    }

    let texto = (textoFinal + textoParcial).trim();

    if(texto.length > 0){
        mostrarLegenda(texto);
    }
};

// LEGENDA (ÚNICA COISA QUE O VLIBRAS VAI LER)
function mostrarLegenda(texto){
    const legenda = document.getElementById("legenda");

    // quebra de linha automática
    if(texto.length > 60){
        let meio = Math.floor(texto.length / 2);
        let quebra = texto.lastIndexOf(" ", meio);
        if(quebra !== -1){
            texto = texto.slice(0, quebra) + "\n" + texto.slice(quebra + 1);
        }
    }

    legenda.innerText = texto;
    legenda.classList.add("show");

    clearTimeout(timeoutLegenda);
    timeoutLegenda = setTimeout(()=>{
        legenda.classList.remove("show");
    },3500);

    // força VLibras ler só a legenda
    setTimeout(() => {
        legenda.click();
    },100);
}

// 🔁 REINÍCIO CONTROLADO
recognition.onend = () => {
    if(ativo){
        setTimeout(()=>{
            if(ativo) recognition.start();
        },200);
    }
};

// ERROS
recognition.onerror = (event) => {
    console.error(event.error);

    if(event.error === "not-allowed"){
        alert("Permissão do microfone negada!");
        ativo = false;
        mic.classList.remove("ativo");
    }
};
</script>

</body>
</html>
