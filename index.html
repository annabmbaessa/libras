<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Voz → Libras</title>

<style>
body{
    margin:0;
    height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #0b1220, #1b2a4a);
}

/* CONTAINER */
.container{
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:18px;
}

/* 🎤 MIC REALISTA */
.mic{
    width:150px;
    height:150px;
    border-radius:50%;
    cursor:pointer;
    position:relative;

    /* base realista (metal escuro) */
    background: radial-gradient(circle at 35% 30%, #2c2f36, #0e1117 70%);

    /* sombra real */
    box-shadow:
        0 10px 25px rgba(0,0,0,0.6),
        inset 0 2px 10px rgba(255,255,255,0.05),
        inset 0 -4px 10px rgba(0,0,0,0.6);

    display:flex;
    align-items:center;
    justify-content:center;

    transition:0.25s ease;
}

/* grade do microfone (realista) */
.mic::before{
    content:"";
    position:absolute;
    width:55px;
    height:75px;
    border-radius:18px;

    background:
        repeating-linear-gradient(
            90deg,
            #d6d6d6 0px,
            #d6d6d6 2px,
            #9aa0a6 2px,
            #9aa0a6 4px
        );

    opacity:0.9;

    box-shadow:
        inset 0 2px 6px rgba(0,0,0,0.4),
        inset 0 -2px 6px rgba(255,255,255,0.1);
}

/* base do microfone */
.mic::after{
    content:"";
    position:absolute;
    bottom:40px;
    width:80px;
    height:10px;
    border-radius:10px;

    background: linear-gradient(90deg, #8c8f96, #5f6368);

    box-shadow: 0 2px 6px rgba(0,0,0,0.5);
}

/* hover leve */
.mic:hover{
    transform: scale(1.04);
}

/* ativo */
.mic.ativo{
    box-shadow:
        0 0 25px rgba(80,160,255,0.35),
        0 10px 25px rgba(0,0,0,0.6),
        inset 0 2px 10px rgba(255,255,255,0.05);
}

/* STATUS */
#status{
    font-size:1.25rem;
    color:#e6e6e6;
    font-weight:500;
    letter-spacing:0.3px;
    text-align:center;
}

/* LEGENDA */
#legenda{
    position:fixed;
    bottom:40px;
    left:50%;
    transform:translateX(-50%);
    background: rgba(0,0,0,0.65);
    padding:14px 22px;
    border-radius:14px;
    color:#fff;
    font-size:1.1rem;
    max-width:80%;
    text-align:center;
    opacity:0;
    transition:0.3s;
    white-space: pre-line;
    backdrop-filter: blur(6px);
}

#legenda.show{
    opacity:1;
}

/* VLibras */
[vw],
[vw-access-button],
.vw-plugin-wrapper {
    pointer-events: auto !important;
}
</style>
</head>

<body>

<div class="container">

    <div id="mic" class="mic"></div>

    <div id="status">Ativar microfone</div>

</div>

<div id="legenda"></div>

<!-- VLibras -->
<div vw class="enabled">
  <div vw-access-button class="active"></div>
  <div vw-plugin-wrapper>
    <div class="vw-plugin-top-wrapper"></div>
  </div>
</div>

<script src="https://vlibras.gov.br/app/vlibras-plugin.js"></script>

<script>
new window.VLibras.Widget('https://vlibras.gov.br/app');

window.addEventListener("load", () => {
    setTimeout(() => {
        const btn = document.querySelector('[vw-access-button]');
        if(btn) btn.click();
    }, 1200);
});

const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
const recognition = new SpeechRecognition();

recognition.lang = "pt-BR";
recognition.continuous = true;
recognition.interimResults = true;

let ativo = false;
let timeoutLegenda;

const mic = document.getElementById("mic");
const status = document.getElementById("status");

/* LIGA / DESLIGA */
mic.onclick = () => {
    if(!ativo){
        recognition.start();
        ativo = true;
        mic.classList.add("ativo");
        status.innerText = "Desativar microfone";
    } else {
        recognition.stop();
        ativo = false;
        mic.classList.remove("ativo");
        status.innerText = "Ativar microfone";
    }
};

/* VOZ → TEXTO */
recognition.onresult = (event) => {
    let textoFinal = "";
    let textoParcial = "";

    for(let i = event.resultIndex; i < event.results.length; i++){
        let transcript = event.results[i][0].transcript;

        if(event.results[i].isFinal){
            textoFinal += transcript + " ";
        } else {
            textoParcial += transcript;
        }
    }

    let texto = (textoFinal + textoParcial).trim();

    if(texto.length > 0){
        mostrarLegenda(texto);
    }
};

function mostrarLegenda(texto){
    const legenda = document.getElementById("legenda");

    if(texto.length > 60){
        let meio = Math.floor(texto.length / 2);
        let quebra = texto.lastIndexOf(" ", meio);
        if(quebra !== -1){
            texto = texto.slice(0, quebra) + "\n" + texto.slice(quebra + 1);
        }
    }

    legenda.innerText = texto;
    legenda.classList.add("show");

    clearTimeout(timeoutLegenda);
    timeoutLegenda = setTimeout(()=>{
        legenda.classList.remove("show");
    },3500);
}

recognition.onend = () => {
    if(ativo){
        setTimeout(()=> recognition.start(),200);
    }
};
</script>

</body>
</html>
