<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Tradutor Voz → Libras</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap');

* {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
}

body{
    background: linear-gradient(135deg, #6a0dad, #00c6ff);
    color: #fff;
    font-family: 'Roboto', Arial, sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100vh;
    text-align: center;
    overflow: hidden;
}

h1{
    font-size: 3rem;
    font-weight: 700;
    margin-bottom: 10px;
    text-shadow: 2px 2px 10px rgba(0,0,0,0.3);
}

p{
    font-size: 1.25rem;
    margin-bottom: 40px;
    color: rgba(255,255,255,0.85);
}

button{
    margin-top: 20px;
    padding: 18px 50px;
    font-size: 1.25rem;
    font-weight: 700;
    border: none;
    border-radius: 30px;
    background: linear-gradient(135deg, #ff8a00, #e52e71);
    color: #fff;
    cursor: pointer;
    box-shadow: 0 8px 20px rgba(0,0,0,0.25);
    transition: all 0.3s ease;
}

button:hover{
    transform: translateY(-3px) scale(1.05);
    box-shadow: 0 12px 25px rgba(0,0,0,0.35);
}

#legenda{
    position: fixed;
    bottom: 50px;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(0,0,0,0.7);
    padding: 18px 35px;
    border-radius: 20px;
    font-size: 1.3rem;
    max-width: 75%;
    text-align: center;
    line-height: 1.5;
    opacity: 0;
    transition: opacity 0.3s ease, transform 0.3s ease;
    backdrop-filter: blur(8px);
    white-space: pre-line;
}

#legenda.show{
    opacity: 1;
    transform: translateX(-50%) translateY(0);
}

.vw-plugin-wrapper {
    bottom: 20px !important;
    right: 20px !important;
}
</style>
</head>

<body>

<h1>🎤 Voz para Libras Automático</h1>
<p>Fale normalmente e veja a tradução em Libras</p>

<button id="start">Iniciar Microfone</button>

<div id="legenda"></div>

<!-- VLibras -->
<div vw class="enabled">
  <div vw-access-button class="active"></div>
  <div vw-plugin-wrapper>
    <div class="vw-plugin-top-wrapper"></div>
  </div>
</div>

<script src="https://vlibras.gov.br/app/vlibras-plugin.js"></script>

<script>
new window.VLibras.Widget('https://vlibras.gov.br/app');

const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
const recognition = new SpeechRecognition();

recognition.lang = "pt-BR";
recognition.continuous = true;
recognition.interimResults = true; // tempo real

let timeoutLegenda;

document.getElementById("start").onclick = () => {
    recognition.start();
}

recognition.onresult = (event) => {
    let textoParcial = "";

    for(let i = event.resultIndex; i < event.results.length; i++){
        let transcript = event.results[i][0].transcript;

        if(event.results[i].isFinal){
            mostrarLegenda(transcript, true); // envia só frase final para VLibras
        } else {
            textoParcial += transcript;
        }
    }

    if(textoParcial.length > 0){
        mostrarLegenda(textoParcial, false); // mostra só visualmente
    }
}

function mostrarLegenda(texto, enviarParaVLibras){
    const legenda = document.getElementById("legenda");

    if(texto.length > 60){
        let meio = Math.floor(texto.length / 2);
        let quebra = texto.lastIndexOf(" ", meio);
        if(quebra !== -1){
            texto = texto.slice(0, quebra) + "\n" + texto.slice(quebra + 1);
        }
    }

    legenda.innerText = texto;
    legenda.classList.add("show");

    clearTimeout(timeoutLegenda);
    timeoutLegenda = setTimeout(()=>{
        legenda.classList.remove("show");
    },3500);

    // só dispara VLibras se for frase final
    if(enviarParaVLibras){
        legenda.click();
    }
}

recognition.onend = () => {
    recognition.start(); 
}

recognition.onerror = (event) => {
    console.error("Erro:", event.error);
    if(event.error === "not-allowed"){
        alert("Permissão do microfone negada!");
    }
}
</script>

</body>
</html>
