<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Voz → Libras</title>

<style>
body{
    margin:0;
    height:100vh;
    display:flex;
    align-items:center;
    justify-content:flex-start;
    padding-left:80px;
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #0f172a, #1e3a8a);
}

/* 🎤 BOTÃO MICROFONE */
.mic{
    width:140px;
    height:140px;
    border-radius:50%;
    display:flex;
    align-items:center;
    justify-content:center;
    background:#111;
    cursor:pointer;
    transition:0.3s;
    box-shadow: 0 0 20px rgba(255,255,255,0.1);
    user-select:none;
    -webkit-user-drag:none;
}

/* ativo */
.mic.ativo{
    box-shadow: 0 0 40px #22c55e;
    transform: scale(1.08);
}

/* imagem */
.mic img{
    width:70px;
    pointer-events:none;
    user-select:none;
    -webkit-user-drag:none;
}

/* TEXTO STATUS */
#status{
    margin-left:40px;
    font-size:1.2rem;
    color:white;
    opacity:0.9;
}

/* LEGENDA */
#legenda{
    position:fixed;
    bottom:40px;
    left:50%;
    transform:translateX(-50%);
    background: rgba(0,0,0,0.7);
    padding:15px 25px;
    border-radius:15px;
    color:#fff;
    font-size:1.2rem;
    max-width:80%;
    text-align:center;
    opacity:0;
    transition:0.3s;
    white-space: pre-line;
}

#legenda.show{
    opacity:1;
}

/* 🔥 VLibras não interfere no mic */
#mic{
    speak: none;
}

/* VLibras totalmente clicável */
[vw],
[vw-access-button],
.vw-plugin-wrapper {
    pointer-events: auto !important;
}
</style>
</head>

<body>

<!-- 🎤 BOTÃO + TEXTO -->
<div style="display:flex; align-items:center;">
    <div id="mic" class="mic" aria-hidden="true">
        <img src="https://cdn-icons-png.flaticon.com/512/61/61088.png">
    </div>

    <div id="status">Ativar microfone</div>
</div>

<div id="legenda"></div>

<!-- VLibras -->
<div vw class="enabled">
  <div vw-access-button class="active"></div>
  <div vw-plugin-wrapper>
    <div class="vw-plugin-top-wrapper"></div>
  </div>
</div>

<script src="https://vlibras.gov.br/app/vlibras-plugin.js"></script>

<script>
new window.VLibras.Widget('https://vlibras.gov.br/app');

const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
const recognition = new SpeechRecognition();

recognition.lang = "pt-BR";
recognition.continuous = true;
recognition.interimResults = true;

let ativo = false;
let timeoutLegenda;

const mic = document.getElementById("mic");
const status = document.getElementById("status");

/* 🎤 LIGA / DESLIGA */
mic.onclick = () => {
    if(!ativo){
        recognition.start();
        ativo = true;
        mic.classList.add("ativo");
        status.innerText = "Desligar microfone";
    } else {
        recognition.stop();
        ativo = false;
        mic.classList.remove("ativo");
        status.innerText = "Ativar microfone";
    }
};

/* VOZ → TEXTO */
recognition.onresult = (event) => {
    let textoFinal = "";
    let textoParcial = "";

    for(let i = event.resultIndex; i < event.results.length; i++){
        let transcript = event.results[i][0].transcript;

        if(event.results[i].isFinal){
            textoFinal += transcript + " ";
        } else {
            textoParcial += transcript;
        }
    }

    let texto = (textoFinal + textoParcial).trim();

    if(texto.length > 0){
        mostrarLegenda(texto);
    }
};

/* LEGENDA */
function mostrarLegenda(texto){
    const legenda = document.getElementById("legenda");

    if(texto.length > 60){
        let meio = Math.floor(texto.length / 2);
        let quebra = texto.lastIndexOf(" ", meio);
        if(quebra !== -1){
            texto = texto.slice(0, quebra) + "\n" + texto.slice(quebra + 1);
        }
    }

    legenda.innerText = texto;
    legenda.classList.add("show");

    clearTimeout(timeoutLegenda);
    timeoutLegenda = setTimeout(()=>{
        legenda.classList.remove("show");
    },3500);

    setTimeout(() => {
        legenda.click();
    },100);
};

/* REINÍCIO CONTROLADO */
recognition.onend = () => {
    if(ativo){
        setTimeout(()=>{
            if(ativo) recognition.start();
        },200);
    }
};

/* ERROS */
recognition.onerror = (event) => {
    console.error(event.error);

    if(event.error === "not-allowed"){
        alert("Permissão do microfone negada!");
        ativo = false;
        mic.classList.remove("ativo");
        status.innerText = "Ativar microfone";
    }
};
</script>

</body>
</html>
